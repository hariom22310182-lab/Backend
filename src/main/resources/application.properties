spring.application.name=Chitale Bandhu

# Optional local override file for development only.
# Keep this file out of source control and use it to provide local values
# like spring.data.mongodb.uri and jwt.secret while testing.
spring.config.import=optional:file:./application.propertiess,optional:file:./src/main/resources/application.propertiess

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DB:membersdb}
spring.data.mongodb.auto-index-creation=true

# Disable JPA/SQL auto-configuration (MongoDB only app)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
spring.data.jpa.repositories.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Server Configuration
server.port=${PORT:8080}

# Logging (optional - reduces noise)
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO
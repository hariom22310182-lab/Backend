# Application Configuration
spring.application.name=Chitale Bandhu

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://dummyforusingin2024_db_user:dummy2026@cluster0.0jjmxh1.mongodb.net/?appName=Cluster0
spring.data.mongodb.database=membersdb
spring.data.mongodb.auto-index-creation=true

# Disable JPA/SQL auto-configuration (MongoDB only app)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
spring.data.jpa.repositories.enabled=false

# JWT Configuration
jwt.secret=MySuperSecretKeyForJWT123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Server Configuration
server.port=8080

# Logging (optional - reduces noise)
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO
